title: "Dirk Röthig | Impact & Innovation"
description: "CEO VERDANTIS Impact Capital — KI-Strategie, Impact Investing, Interim Management, nachhaltiges Wirtschaften."
author: "Dirk Röthig"
email: dirk@roethig.nl
url: "https://gaudianvivere.github.io"
baseurl: ""

lang: de
timezone: Europe/Berlin

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /posts/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# SEO
twitter:
  username: dirkroethig

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Collections
collections:
  posts:
    output: true
    permalink: /posts/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Dirk Röthig"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
